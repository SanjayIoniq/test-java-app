apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pricing-app
  template:
    metadata:
      labels:
        app: pricing-app
    spec:
      containers:
      - name: pricing-container
        image: sanjayioniq/pricing-app:v3
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
spec:
  type: NodePort
  selector:
    app: pricing-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007